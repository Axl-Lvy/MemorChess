<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>MemorChess — Kinetic · Training · Mobile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter+Tight:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link href="kinetic-base.css" rel="stylesheet" />
    <style>
      body { display: block; }

      .phone-app {
        position: absolute;
        inset: 44px 0 0 0;
        display: grid;
        grid-template-rows: auto auto auto auto auto auto 1fr auto auto;
        height: calc(100% - 44px);
        background: var(--bg);
        background-image: radial-gradient(ellipse 50% 30% at 0% 0%, var(--accent-soft), transparent 70%);
      }

      .m-topbar {
        display: flex; align-items: center; justify-content: space-between;
        padding: 10px 14px;
        border-bottom: 1px solid var(--line);
        position: relative;
      }
      .m-topbar::after {
        content: ""; position: absolute; left: 0; right: 0; bottom: -1px; height: 1px;
        background: linear-gradient(90deg, transparent, var(--cyan) 15%, var(--accent) 50%, var(--cyan) 85%, transparent);
        opacity: 0.6;
      }
      .m-brand { display: flex; align-items: center; gap: 8px; }
      .m-brand .brand-mark { width: 28px; height: 28px; font-size: 16px; }
      .m-brand .brand-name { font-size: 15px; }
      .m-meta { display: flex; align-items: center; gap: 10px; }
      .m-pill {
        display: flex; flex-direction: column; align-items: end;
        font-family: var(--mono); font-size: 8px;
        color: var(--ink-3); letter-spacing: 0.1em;
        text-transform: uppercase; line-height: 1.1; gap: 1px;
      }
      .m-pill b {
        font-family: var(--display); font-weight: 700; font-size: 15px;
        letter-spacing: -0.02em; color: var(--ink);
      }
      .m-pill.hot b { color: var(--accent-text); }
      .m-toggle {
        background: transparent;
        border: 1px solid var(--line-bright);
        color: var(--ink-2);
        width: 32px; height: 32px;
        display: grid; place-items: center;
        cursor: pointer;
      }
      .m-toggle svg { width: 14px; height: 14px; }
      .m-toggle .moon { display: none; }
      [data-theme="light"] .m-toggle .sun { display: none; }
      [data-theme="light"] .m-toggle .moon { display: inline-block; }

      .m-head {
        padding: 12px 18px 4px;
      }
      .m-head .tag {
        font-family: var(--mono); font-size: 9px;
        color: var(--accent-text); letter-spacing: 0.18em; text-transform: uppercase;
      }
      .m-head .tag::before { content: "▍"; margin-right: 4px; }
      .m-head h1 {
        margin-top: 3px; font-family: var(--display); font-weight: 700;
        font-size: 26px; line-height: 0.95; letter-spacing: -0.04em;
      }
      .m-head h1 .alt { color: var(--accent-text); font-style: italic; }

      .counters-row {
        margin: 8px 14px 0;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 4px;
      }
      .counter {
        position: relative;
        padding: 7px 10px 8px;
        background: var(--panel);
        border: 1px solid var(--line);
      }
      .counter::before {
        content: "";
        position: absolute;
        top: 0; left: 0; bottom: 0;
        width: 2px;
        background: var(--accent);
      }
      .counter.success::before { background: var(--green); }
      .counter.fail::before { background: var(--red); }
      .counter .v {
        font-family: var(--display); font-weight: 700;
        font-size: 22px; line-height: 1; letter-spacing: -0.035em;
      }
      .counter.success .v { color: var(--green); }
      .counter.fail .v { color: var(--red); }
      .counter.left .v { color: var(--accent-text); }
      .counter .k {
        margin-top: 2px;
        font-family: var(--mono); font-size: 8px;
        color: var(--ink-3); letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .progress-rail {
        margin: 6px 18px 0;
        height: 3px; background: var(--panel-3); position: relative;
      }
      .progress-rail .done {
        background: linear-gradient(90deg, var(--cyan), var(--accent));
        height: 100%; width: 30%;
        box-shadow: 0 0 10px var(--cyan-glow);
      }

      .trail { margin-top: 10px; }
      .trail-line-name { padding: 0 10px; font-size: 8.5px; }
      .trail-arrow { width: 30px; }
      .trail-arrow svg { width: 11px; height: 11px; }
      .trail-pgn { padding: 0 10px; font-size: 8.5px; }
      .trail-scroll { padding: 7px 10px; gap: 3px; }
      .trail-scroll .ply-n { font-size: 9px; padding: 0 1px 0 4px; }
      .trail-scroll .mv { font-size: 10.5px; padding: 2px 5px; }

      .board-area {
        padding: 10px 14px 0;
        display: grid; grid-template-columns: 14px 1fr;
        gap: 8px; align-items: center;
        align-self: start;
      }
      .board-shell.compact { padding: 8px; }

      /* fill spacer */
      .spacer { /* used to push controls to bottom */ }

      /* turn-pill bar */
      .turn-bar {
        margin: 12px 14px 0;
        padding: 12px 14px;
        background: var(--panel);
        border: 1px solid var(--line);
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 10px; align-items: center;
      }
      .turn-bar .king {
        width: 32px; height: 32px;
        font-size: 22px; line-height: 1;
        color: #fff; background: var(--sq-dark);
        border: 1px solid var(--line-bright);
        display: grid; place-items: center;
      }
      .turn-bar .label {
        font-family: var(--display); font-weight: 700;
        font-size: 14px; letter-spacing: -0.015em;
      }
      .turn-bar .label small {
        display: block;
        font-family: var(--mono); font-size: 9px;
        color: var(--ink-3); font-weight: 400;
        letter-spacing: 0.12em; text-transform: uppercase;
        margin-top: 2px;
      }
      .turn-bar .actions { display: flex; gap: 4px; }
      .turn-bar .ico-btn {
        background: var(--panel-2);
        border: 1px solid var(--line-bright);
        color: var(--ink-2);
        width: 36px; height: 36px;
        display: grid; place-items: center;
        cursor: pointer;
      }
      .turn-bar .ico-btn.primary {
        background: var(--accent);
        color: var(--on-accent);
        border-color: var(--accent);
      }
      [data-theme="light"] .turn-bar .ico-btn.primary {
        box-shadow: 0 3px 10px rgba(255, 91, 38, 0.3);
      }
      .turn-bar .ico-btn svg { width: 14px; height: 14px; }

      .pgn-overlay {
        position: absolute; inset: 0;
        padding: 60px 18px;
      }
      .pgn-card { max-height: 85%; }
      .pgn-card-body { padding: 14px 16px; font-size: 12px; line-height: 1.8; }
      .pgn-card-head h3 { font-size: 16px; }
    </style>
  </head>
  <body class="phone-host">
    <div class="phone bg-glow">
      <div class="statusbar">
        <span>09:42</span>
        <div class="icons">
          <svg viewBox="0 0 16 16" fill="currentColor"><path d="M2 12h2v2H2zM5 9h2v5H5zM8 6h2v8H8zM11 3h2v11h-2z"/></svg>
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M8 12.5c-3 0-5.5-2-6-4 1-1 3-2 6-2s5 1 6 2c-.5 2-3 4-6 4z"/><circle cx="8" cy="11" r="0.8" fill="currentColor"/></svg>
          <svg viewBox="0 0 22 12" fill="none" stroke="currentColor" stroke-width="1"><rect x="0.5" y="0.5" width="19" height="11" rx="2.5"/><rect x="2" y="2" width="14" height="8" rx="1" fill="currentColor"/><rect x="20" y="4" width="2" height="4" rx="0.5" fill="currentColor"/></svg>
        </div>
      </div>
      <div class="notch"></div>

      <div class="phone-app">
        <header class="m-topbar">
          <div class="m-brand">
            <div class="brand-mark"><span>M</span></div>
            <div class="brand-name">MEMOR<span class="slash">/</span>CHESS</div>
          </div>
          <div class="m-meta">
            <div class="m-pill hot"><b>+1</b>AHEAD</div>
            <button class="m-toggle" id="themeToggle">
              <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M5 19l2-2M17 7l2-2"/></svg>
              <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 14A8 8 0 0 1 10 4a8 8 0 1 0 10 10z"/></svg>
            </button>
          </div>
        </header>

        <section class="m-head">
          <div class="tag">training · live · day +1</div>
          <h1>Recall the <span class="alt">move</span></h1>
        </section>

        <div class="counters-row">
          <div class="counter success">
            <div class="v">06</div>
            <div class="k">success</div>
          </div>
          <div class="counter fail">
            <div class="v">01</div>
            <div class="k">to retry</div>
          </div>
          <div class="counter left">
            <div class="v">16</div>
            <div class="k">left</div>
          </div>
        </div>

        <div class="progress-rail"><div class="done"></div></div>

        <div class="trail">
          <span class="trail-line-name">ITAL/QUIET</span>
          <button class="trail-arrow left" id="trailLeft">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <div class="trail-scroll" id="trailScroll">
            <span class="ply-n">1</span><span class="mv">e4</span><span class="mv dim">e5</span>
            <span class="ply-n">2</span><span class="mv">Nf3</span><span class="mv dim">Nc6</span>
            <span class="ply-n">3</span><span class="mv">Bc4</span><span class="mv dim">Bc5</span>
            <span class="ply-n">4</span><span class="mv">d3</span><span class="mv dim">Nf6</span>
            <span class="ply-n">5</span><span class="mv">O-O</span><span class="mv dim">d6</span>
            <span class="ply-n">6</span><span class="mv">c3</span><span class="mv dim">a6</span>
            <span class="ply-n">7</span><span class="mv">Bb3</span><span class="mv current" id="currentMove">?</span>
          </div>
          <button class="trail-arrow right" id="trailRight">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
          </button>
          <button class="trail-pgn" id="pgnBtn">PGN</button>
        </div>

        <div class="board-area">
          <div class="eval-rail thin">
            <div class="b"></div><div class="w"></div>
            <div class="marker"></div>
            <span class="v">+0.32</span>
          </div>
          <div class="board-shell compact">
            <span class="corner-tag">POS <b>07/23</b></span>
            <span class="your-move">Your move</span>
            <div class="board" id="board"></div>
          </div>
        </div>

        <div class="spacer"></div>

        <div class="turn-bar">
          <span class="king">♚</span>
          <div class="label">Black to move<small>find the trained move</small></div>
          <div class="actions">
            <button class="ico-btn" title="Skip">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 4l10 8-10 8V4zM19 4v16"/></svg>
            </button>
            <button class="ico-btn" title="Hint">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 18h6M10 21h4M12 3a6 6 0 0 0-4 10.5c.7.7 1 1.5 1 2.5h6c0-1 .3-1.8 1-2.5A6 6 0 0 0 12 3z"/></svg>
            </button>
            <button class="ico-btn primary" title="Reveal">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <nav class="bottomnav">
          <button class="nav-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 3v18M3 12h18"/></svg>
            <span>Explore</span>
          </button>
          <button class="nav-btn active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 19l4-4 3 3 7-9M14 9h5v5"/></svg>
            <span>Train</span>
          </button>
          <button class="nav-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 5v14M9 5v14M14 5v14M19 6l1 13"/></svg>
            <span>Library</span>
          </button>
          <button class="nav-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1.2l2-1.5-2-3.4-2.4.9a7 7 0 0 0-2-1.2L14 3h-4l-.5 2.6a7 7 0 0 0-2 1.2l-2.4-.9-2 3.4 2 1.5A7 7 0 0 0 5 12c0 .4 0 .8.1 1.2l-2 1.5 2 3.4 2.4-.9a7 7 0 0 0 2 1.2L10 21h4l.5-2.6a7 7 0 0 0 2-1.2l2.4.9 2-3.4-2-1.5c.1-.4.1-.8.1-1.2z"/></svg>
            <span>Settings</span>
          </button>
        </nav>

        <div class="pgn-overlay" id="pgnOverlay">
          <div class="pgn-card">
            <div class="pgn-card-head">
              <h3>Full notation</h3>
              <button class="close" id="pgnClose">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M6 6l12 12M18 6L6 18"/></svg>
              </button>
            </div>
            <div class="pgn-card-body" id="pgnBody"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="proposal-marker">Kinetic · <b>Training</b> · mobile</div>

    <script>
      const themeToggle = document.getElementById("themeToggle");
      themeToggle.addEventListener("click", () => {
        const cur = document.documentElement.getAttribute("data-theme") || "dark";
        document.documentElement.setAttribute("data-theme", cur === "dark" ? "light" : "dark");
      });

      const board = document.getElementById("board");
      const files = ["a","b","c","d","e","f","g","h"];
      const layout = [
        ["r","·","b","q","k","·","·","r"],
        ["·","p","p","p","·","p","p","p"],
        ["p","·","n","·","·","n","·","·"],
        ["·","·","b","·","p","·","·","·"],
        ["·","·","·","·","P","·","·","·"],
        ["·","B","P","P","·","N","·","·"],
        ["P","P","·","·","·","P","P","P"],
        ["R","N","B","Q","·","R","K","·"],
      ];
      const sym = { K:"♔",Q:"♕",R:"♖",B:"♗",N:"♘",P:"♙",k:"♚",q:"♛",r:"♜",b:"♝",n:"♞",p:"♟" };
      for (let row=0; row<8; row++) {
        for (let col=0; col<8; col++) {
          const sq = document.createElement("div");
          const isLight = (row+col) % 2 === 0;
          sq.className = "sq " + (isLight ? "light" : "dark");
          if (row === 4 && col === 2) sq.classList.add("last-from");
          if (row === 5 && col === 1) sq.classList.add("last-to");
          if (col === 0) {
            const r = document.createElement("span"); r.className = "rank-label"; r.textContent = 8-row;
            sq.appendChild(r);
          }
          if (row === 7) {
            const f = document.createElement("span"); f.className = "file-label"; f.textContent = files[col];
            sq.appendChild(f);
          }
          const ch = layout[row][col];
          if (ch !== "·") {
            const p = document.createElement("span");
            p.textContent = sym[ch];
            p.className = (ch === ch.toUpperCase()) ? "piece-white" : "piece-black";
            sq.appendChild(p);
          }
          board.appendChild(sq);
        }
      }

      const trail = document.getElementById("trailScroll");
      const currentMv = document.getElementById("currentMove");
      requestAnimationFrame(() => {
        if (currentMv && trail) {
          const offset = currentMv.offsetLeft - trail.clientWidth + currentMv.offsetWidth + 60;
          trail.scrollLeft = Math.max(0, offset);
        }
      });
      document.getElementById("trailLeft").addEventListener("click", () => trail.scrollBy({ left: -100, behavior: "smooth" }));
      document.getElementById("trailRight").addEventListener("click", () => trail.scrollBy({ left: 100, behavior: "smooth" }));

      const overlay = document.getElementById("pgnOverlay");
      const pgnBody = document.getElementById("pgnBody");
      const moves = [];
      Array.from(trail.children).forEach((el) => {
        if (el.classList.contains("mv") && el.textContent !== "?") {
          moves.push({ text: el.textContent, current: el.classList.contains("current") });
        }
      });
      for (let i = 0; i < moves.length; i += 2) {
        const row = document.createElement("div"); row.className = "ply-row";
        const w = moves[i]; const b = moves[i + 1];
        row.innerHTML = `<span class="n">${i / 2 + 1}.</span><span class="w ${w && w.current ? "current" : ""}">${w ? w.text : ""}</span><span class="b ${b && b.current ? "current" : ""}">${b ? b.text : "&hellip;"}</span>`;
        pgnBody.appendChild(row);
      }
      document.getElementById("pgnBtn").addEventListener("click", () => overlay.classList.add("open"));
      document.getElementById("pgnClose").addEventListener("click", () => overlay.classList.remove("open"));
      overlay.addEventListener("click", (e) => { if (e.target === overlay) overlay.classList.remove("open"); });
    </script>
  </body>
</html>
