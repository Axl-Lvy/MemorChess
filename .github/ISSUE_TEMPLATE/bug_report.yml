name: Bug report
description: Report a problem with MemorChess
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected to happen instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Where did you encounter the bug?
      options:
        - Android
        - iOS
        - JVM desktop
        - WebAssembly (web)
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version / commit
      description: The release version or git commit you were running.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste any relevant logs, stack traces, or screenshots.
    validations:
      required: false
