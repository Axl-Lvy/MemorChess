name: Check code

on:
  pull_request:
  push:
    branches: [ master ]
  schedule:
    - cron: 0 0 * * 1,4

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GITHUB_ACTOR: ${{ github.actor }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # Check if Kotlin or Java files were modified
  is-check-necessary:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for Kotlin/Java file changes
        id: check
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "Scheduled run - executing all jobs"
            exit 0
          fi

          # Check if PR title contains [skip-test]
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            PR_TITLE="${{ github.event.pull_request.title }}"
            if echo "$PR_TITLE" | grep -qi "\[skip-tests\]"; then
              echo "should_run=false" >> $GITHUB_OUTPUT
              echo "PR title contains [skip-tests] - skipping jobs"
              exit 0
            fi
          fi

          if [ "${{ github.event_name }}" == "push" ]; then
            # For push events, compare with the previous commit
            FILES_CHANGED=$(git diff --name-only HEAD~1 HEAD || echo "")
          else
            # For pull requests, compare with the base branch
            git fetch origin ${{ github.base_ref }}
            FILES_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD || echo "")
          fi

          if echo "$FILES_CHANGED" | grep -qE '\.(kt|java)$'; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "Kotlin or Java files were modified - executing jobs"
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "No Kotlin or Java files modified - skipping jobs"
          fi

  # Run JVM tests with Kover coverage
  jvm-tests:
    needs: [is-check-necessary]
    if: needs.is-check-necessary.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Update secrets with the specific TEST_USER_MAIL for this shard
      - name: Update local.properties for this shard
        run: |
          chmod +x .github/scripts/update_properties.sh
          .github/scripts/update_properties.sh
        env:
          SUPABASE_API_KEY: ${{ secrets.SUPABASE_API_KEY }}
          TEST_USER_MAIL: "testuser19@axl.com"
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-home-cache-cleanup: false

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Run JVM tests with coverage
        run: ./gradlew koverXmlReportJvm

      - name: Upload Kover coverage report
        uses: actions/upload-artifact@v4
        with:
          name: kover-report-jvm
          path: composeApp/build/reports/kover/
          retention-days: 1

      - name: Upload JVM test result files
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jvm-test-results
          path: composeApp/build/test-results/jvmTest/*.xml
          retention-days: 1

  # Run Android tests in parallel
  android-tests:
    needs: [is-check-necessary]
    if: needs.is-check-necessary.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        shard_index: [0, 1, 2, 3]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Update secrets with the specific TEST_USER_MAIL for this shard
      - name: Update local.properties for this shard
        run: |
          chmod +x .github/scripts/update_properties.sh
          .github/scripts/update_properties.sh
        env:
          SUPABASE_API_KEY: ${{ secrets.SUPABASE_API_KEY }}
          TEST_USER_MAIL: "testuser${{matrix.shard_index}}@axl.com"
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-30-google-apis

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-home-cache-cleanup: false

      # Create AVD if needed
      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      # Run tests with the specific configuration
      - name: Run tests
        env:
          ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL: 1
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew connectedCheck --no-daemon -PshardIndex=${{ matrix.shard_index }} -PnumShards=4

      # Process coverage data
      - name: Rename coverage report
        run: |
          mkdir -p composeApp/build/outputs/code_coverage/${{ matrix.shard_index }}/
          find composeApp/build/outputs/code_coverage/ -name "*.ec" -exec cp {} composeApp/build/outputs/code_coverage/${{ matrix.shard_index }}/ \;

      - name: Upload coverage to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-android-${{ matrix.shard_index }}
          path: composeApp/build/outputs/code_coverage/
          retention-days: 1

      - name: Upload Android test result files
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-test-results-${{ matrix.shard_index }}
          path: composeApp/build/outputs/androidTest-results/connected/*.xml
          retention-days: 1

  # Run wasmJs tests (no coverage - Kover does not support wasmJs)
  wasm-tests:
    needs: [is-check-necessary]
    if: needs.is-check-necessary.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Update secrets with the specific TEST_USER_MAIL for this shard
      - name: Update local.properties
        run: |
          chmod +x .github/scripts/update_properties.sh
          .github/scripts/update_properties.sh
        env:
          SUPABASE_API_KEY: ${{ secrets.SUPABASE_API_KEY }}
          TEST_USER_MAIL: "testuser18@axl.com"
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-home-cache-cleanup: false

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Run wasm tests
        run: ./gradlew :composeApp:wasmJsTest --no-configuration-cache

      - name: Upload wasm test result files
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wasm-test-results
          path: composeApp/build/test-results/wasmJsBrowserTest/*.xml
          retention-days: 1

  # Publish test results
  publish-test-results:
    name: Publish Test Results
    runs-on: ubuntu-latest
    needs: [is-check-necessary, android-tests, jvm-tests, wasm-tests]
    if: always() && needs.is-check-necessary.outputs.should_run == 'true'
    permissions:
      checks: write
      pull-requests: write
      contents: read
      issues: read
    steps:
      - name: Download JVM test results
        uses: actions/download-artifact@v4
        if: always()
        with:
          name: jvm-test-results
          path: test-results/jvm

      - name: Download Android test results
        uses: actions/download-artifact@v4
        if: always()
        with:
          pattern: android-test-results-*
          path: test-results/android
          merge-multiple: true

      - name: Download Wasm test results
        uses: actions/download-artifact@v4
        if: always()
        with:
          name: wasm-test-results
          path: test-results/wasm

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        id: test-results
        if: always()
        with:
          files: |
            test-results/**/*.xml
          check_name: Test Results
          comment_title: Test Results

      - name: Set badge color
        shell: bash
        if: always()
        run: |
          case ${{ fromJSON( steps.test-results.outputs.json ).conclusion }} in
            success)
              echo "BADGE_COLOR=31c653" >> $GITHUB_ENV
              ;;
            failure)
              echo "BADGE_COLOR=800000" >> $GITHUB_ENV
              ;;
            neutral)
              echo "BADGE_COLOR=696969" >> $GITHUB_ENV
              ;;
          esac

      - name: Create badge
        uses: emibcn/badge-action@808173dd03e2f30c980d03ee49e181626088eee8
        if: always()
        with:
          label: Tests
          status: '${{ fromJSON( steps.test-results.outputs.json ).formatted.stats.tests }} tests passed'
          color: ${{ env.BADGE_COLOR }}
          path: badge.svg

      - name: Upload badge to Gist
        if: >
          always() &&
          (github.event_name == 'push' && github.ref == 'refs/heads/master' ||
          github.event_name == 'schedule')
        uses: andymckay/append-gist-action@6e8d64427fe47cbacf4ab6b890411f1d67c07f3e
        with:
          token: ${{ secrets.GIST_TOKEN }}
          gistURL: https://gist.githubusercontent.com/Axl-Lvy/${{ secrets.GIST_ID }}
          file: badge.svg

  # Sonar analysis with JVM + Android coverage
  sonar-analysis:
    name: Sonar analysis
    runs-on: ubuntu-latest
    needs: [is-check-necessary, android-tests, jvm-tests]
    if: needs.is-check-necessary.outputs.should_run == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download android coverage reports
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-report-*
          path: composeApp/build/outputs/code_coverage/

      - name: Download JVM Kover report
        uses: actions/download-artifact@v4
        with:
          name: kover-report-jvm
          path: composeApp/build/reports/kover/

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Compile sources and generate JaCoCo XML reports
        run: |
          ./gradlew --build-cache compileDebugKotlinAndroid compileDebugJavaWithJavac jacocoAndroidTestReport

      - name: Analyze with coverage
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [[ "${GITHUB_REF_NAME}" == "master" ]]; then
            ./gradlew sonar --no-configuration-cache --no-parallel --no-daemon \
              -Dsonar.branch.name=master
          else
            ./gradlew sonar --no-configuration-cache --no-parallel --no-daemon
          fi

  # Check code formatting using ktfmt
  format-check:
    needs: [is-check-necessary]
    if: needs.is-check-necessary.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Run formatter check
        run: ./gradlew ktfmtCheck

  # Final status check - always succeeds if jobs passed or were skipped
  # This is the job that should be required in branch protection rules
  check-status:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [is-check-necessary, jvm-tests, android-tests, wasm-tests, publish-test-results, sonar-analysis, format-check]
    if: always()
    steps:
      - name: Check job results
        run: |
          # If is-check-necessary said we should skip, that's a success
          if [ "${{ needs.is-check-necessary.outputs.should_run }}" == "false" ]; then
            echo "No Kotlin/Java files modified - checks skipped successfully"
            exit 0
          fi

          # Otherwise, check that all jobs succeeded
          if [ "${{ needs.jvm-tests.result }}" != "success" ]; then
            echo "JVM tests failed or were cancelled"
            exit 1
          fi

          if [ "${{ needs.android-tests.result }}" != "success" ]; then
            echo "Android tests failed or were cancelled"
            exit 1
          fi

          if [ "${{ needs.wasm-tests.result }}" != "success" ]; then
            echo "WasmJs tests failed or were cancelled"
            exit 1
          fi

          if [ "${{ needs.publish-test-results.result }}" != "success" ]; then
            echo "Publish test results failed or was cancelled"
            exit 1
          fi

          if [ "${{ needs.sonar-analysis.result }}" != "success" ]; then
            echo "Sonar analysis failed or was cancelled"
            exit 1
          fi

          if [ "${{ needs.format-check.result }}" != "success" ]; then
            echo "Format check failed or was cancelled"
            exit 1
          fi

          echo "All checks passed successfully"
