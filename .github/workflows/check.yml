name: Check code

on:
  pull_request:
  schedule:
    - cron: 0 0 * * *

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Consumed by settings.gradle.kts to authenticate against the
# Stockfish-Multiplatform GitHub Packages repository.
env:
  GITHUB_ACTOR: ${{ github.actor }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # Resolve which tier of checks to run:
  #   noop  -> no code/build files touched, nothing to verify
  #   cheap -> only commonMain / jvmMain / tests, run jvm + multiplat compile + sonar
  #   full  -> platform code or build config touched, run all targets + sonar
  detect:
    runs-on: ubuntu-latest
    outputs:
      tier: ${{ steps.tier.outputs.tier }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute override
        id: override
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ "$EVENT_NAME" = "schedule" ]; then
            echo "force=full" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$EVENT_NAME" = "pull_request" ]; then
            if printf '%s' "$PR_TITLE" | grep -qi '\[skip-tests\]'; then
              echo "force=noop" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if printf '%s' "$PR_BODY" | grep -qE '\- \[x\] Force running tests'; then
              echo "force=full" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "force=" >> "$GITHUB_OUTPUT"

      - uses: dorny/paths-filter@v3
        id: filter
        if: steps.override.outputs.force == ''
        with:
          filters: |
            code:
              - '**/*.kt'
              - '**/*.kts'
              - '**/*.java'
              - '**/*.toml'
              - '**/*.xml'
              - '**/*.properties'
              - 'gradle/wrapper/**'
              - '.github/workflows/check.yml'
            platform:
              - 'composeApp/src/androidMain/**'
              - 'composeApp/src/iosMain/**'
              - 'composeApp/src/wasmJsMain/**'
              - 'composeApp/src/nonJsMain/**'
              - 'composeApp/src/androidInstrumentedTest/**'
              - 'composeApp/src/debugMain/**'
              - '**/AndroidManifest.xml'
              - '**/*.gradle.kts'
              - 'gradle/libs.versions.toml'
              - 'gradle/wrapper/**'
              - '.github/workflows/check.yml'

      - name: Resolve tier
        id: tier
        env:
          FORCE: ${{ steps.override.outputs.force }}
          CODE: ${{ steps.filter.outputs.code }}
          PLATFORM: ${{ steps.filter.outputs.platform }}
        run: |
          if [ -n "$FORCE" ]; then
            echo "tier=$FORCE" >> "$GITHUB_OUTPUT"
            echo "tier (forced) = $FORCE"
            exit 0
          fi
          if [ "$PLATFORM" = "true" ]; then
            echo "tier=full" >> "$GITHUB_OUTPUT"
            echo "tier = full"
          elif [ "$CODE" = "true" ]; then
            echo "tier=cheap" >> "$GITHUB_OUTPUT"
            echo "tier = cheap"
          else
            echo "tier=noop" >> "$GITHUB_OUTPUT"
            echo "tier = noop"
          fi

  # Check code formatting using ktfmt
  format-check:
    needs: [detect]
    if: needs.detect.outputs.tier != 'noop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Run formatter check
        run: ./gradlew ktfmtCheck

  # Run JVM tests with Kover coverage (designated Gradle cache writer)
  jvm-tests:
    needs: [detect]
    if: needs.detect.outputs.tier != 'noop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Update local.properties
        run: .github/scripts/update_properties.sh

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-home-cache-cleanup: false

      - name: Run JVM tests with coverage
        run: ./gradlew koverXmlReportJvm

      - name: Upload Kover coverage report
        uses: actions/upload-artifact@v4
        with:
          name: kover-report-jvm
          path: composeApp/build/reports/kover/
          retention-days: 1

      - name: Upload JVM test result files
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jvm-test-results
          path: composeApp/build/test-results/jvmTest/*.xml
          retention-days: 1

  # Cheap tier safety net: compile Android + wasm to catch expect/actual breaks
  compile-multiplat:
    needs: [detect]
    if: needs.detect.outputs.tier == 'cheap'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Update local.properties
        run: .github/scripts/update_properties.sh

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Compile Android + wasm targets
        run: ./gradlew compileDebugKotlinAndroid compileKotlinWasmJs

  # Full tier: Android instrumented tests, sharded across emulators
  android-tests:
    needs: [detect]
    if: needs.detect.outputs.tier == 'full'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        shard_index: [0, 1, 2, 3]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Update local.properties
        run: .github/scripts/update_properties.sh

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-30-google-apis

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Run tests
        env:
          ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL: 1
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew connectedCheck --no-daemon -PshardIndex=${{ matrix.shard_index }} -PnumShards=4

      - name: Rename coverage report
        run: |
          mkdir -p composeApp/build/outputs/code_coverage/${{ matrix.shard_index }}/
          find composeApp/build/outputs/code_coverage/ -name "*.ec" -exec cp {} composeApp/build/outputs/code_coverage/${{ matrix.shard_index }}/ \;

      - name: Upload coverage to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-android-${{ matrix.shard_index }}
          path: composeApp/build/outputs/code_coverage/
          retention-days: 1

      - name: Upload Android test result files
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-test-results-${{ matrix.shard_index }}
          path: composeApp/build/outputs/androidTest-results/connected/*.xml
          retention-days: 1

  # Full tier: wasmJs tests (no coverage - Kover does not support wasmJs)
  wasm-tests:
    needs: [detect]
    if: needs.detect.outputs.tier == 'full'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Update local.properties
        run: .github/scripts/update_properties.sh

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Run wasm tests
        run: ./gradlew :composeApp:wasmJsTest --no-configuration-cache

      - name: Upload wasm test result files
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wasm-test-results
          path: composeApp/build/test-results/wasmJsBrowserTest/*.xml
          retention-days: 1

  # Publish aggregated test results and badge
  publish-test-results:
    name: Publish Test Results
    runs-on: ubuntu-latest
    needs: [detect, jvm-tests, android-tests, wasm-tests]
    if: >
      always() && needs.detect.outputs.tier != 'noop' &&
      (needs.jvm-tests.result == 'success' || needs.jvm-tests.result == 'failure')
    permissions:
      checks: write
      pull-requests: write
      contents: read
      issues: read
    steps:
      - name: Download JVM test results
        uses: actions/download-artifact@v4
        with:
          name: jvm-test-results
          path: test-results/jvm

      - name: Download Android test results
        if: needs.detect.outputs.tier == 'full' && needs.android-tests.result != 'skipped'
        uses: actions/download-artifact@v4
        with:
          pattern: android-test-results-*
          path: test-results/android
          merge-multiple: true

      - name: Download Wasm test results
        if: needs.detect.outputs.tier == 'full' && needs.wasm-tests.result != 'skipped'
        uses: actions/download-artifact@v4
        with:
          name: wasm-test-results
          path: test-results/wasm

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        id: test-results
        with:
          files: |
            test-results/**/*.xml
          check_name: Test Results
          comment_title: Test Results

      - name: Set badge color
        shell: bash
        run: |
          case ${{ fromJSON( steps.test-results.outputs.json ).conclusion }} in
            success)
              echo "BADGE_COLOR=31c653" >> $GITHUB_ENV
              ;;
            failure)
              echo "BADGE_COLOR=800000" >> $GITHUB_ENV
              ;;
            neutral)
              echo "BADGE_COLOR=696969" >> $GITHUB_ENV
              ;;
          esac

      - name: Create badge
        uses: emibcn/badge-action@808173dd03e2f30c980d03ee49e181626088eee8
        with:
          label: Tests
          status: '${{ fromJSON( steps.test-results.outputs.json ).formatted.stats.tests }} tests passed'
          color: ${{ env.BADGE_COLOR }}
          path: badge.svg

      - name: Upload badge to Gist
        if: github.event_name == 'schedule'
        uses: andymckay/append-gist-action@6e8d64427fe47cbacf4ab6b890411f1d67c07f3e
        with:
          token: ${{ secrets.GIST_TOKEN }}
          gistURL: https://gist.githubusercontent.com/Axl-Lvy/${{ secrets.GIST_ID }}
          file: badge.svg

  # Sonar analysis: runs on cheap (JVM coverage only) and full (JVM + Android)
  sonar-analysis:
    name: Sonar analysis
    runs-on: ubuntu-latest
    needs: [detect, jvm-tests, android-tests]
    if: >
      needs.detect.outputs.tier != 'noop' &&
      needs.jvm-tests.result == 'success' &&
      (needs.android-tests.result == 'success' || needs.android-tests.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Android coverage
        if: needs.detect.outputs.tier == 'full'
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-report-android-*
          path: composeApp/build/outputs/code_coverage/

      - name: Download JVM Kover report
        uses: actions/download-artifact@v4
        with:
          name: kover-report-jvm
          path: composeApp/build/reports/kover/

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'zulu'

      - uses: gradle/actions/setup-gradle@v4

      - name: Compile sources and generate Android coverage report
        run: |
          if [ "${{ needs.detect.outputs.tier }}" = "full" ]; then
            ./gradlew --build-cache compileDebugKotlinAndroid compileDebugJavaWithJavac jacocoAndroidTestReport
          else
            ./gradlew --build-cache compileDebugKotlinAndroid compileDebugJavaWithJavac
          fi

      - name: Analyze with coverage
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [[ "${GITHUB_REF_NAME}" == "master" ]]; then
            ./gradlew sonar --no-configuration-cache --no-parallel --no-daemon \
              -Dsonar.branch.name=master
          else
            ./gradlew sonar --no-configuration-cache --no-parallel --no-daemon
          fi

  # Final status check - this is the job that should be required in branch protection
  check-status:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [detect, format-check, jvm-tests, compile-multiplat, android-tests, wasm-tests, publish-test-results, sonar-analysis]
    if: always()
    steps:
      - name: Check job results
        env:
          TIER: ${{ needs.detect.outputs.tier }}
          FORMAT: ${{ needs.format-check.result }}
          JVM: ${{ needs.jvm-tests.result }}
          MULTIPLAT: ${{ needs.compile-multiplat.result }}
          ANDROID: ${{ needs.android-tests.result }}
          WASM: ${{ needs.wasm-tests.result }}
          PUBLISH: ${{ needs.publish-test-results.result }}
          SONAR: ${{ needs.sonar-analysis.result }}
        run: |
          fail() { echo "$1 failed (result=$2)"; exit 1; }

          echo "Resolved tier: $TIER"

          if [ "$TIER" = "noop" ]; then
            echo "No code changes detected, skipping checks"
            exit 0
          fi

          [ "$FORMAT"  = "success" ] || fail format-check "$FORMAT"
          [ "$JVM"     = "success" ] || fail jvm-tests "$JVM"
          [ "$PUBLISH" = "success" ] || fail publish-test-results "$PUBLISH"
          [ "$SONAR"   = "success" ] || fail sonar-analysis "$SONAR"

          if [ "$TIER" = "cheap" ]; then
            [ "$MULTIPLAT" = "success" ] || fail compile-multiplat "$MULTIPLAT"
          fi

          if [ "$TIER" = "full" ]; then
            [ "$ANDROID" = "success" ] || fail android-tests "$ANDROID"
            [ "$WASM"    = "success" ] || fail wasm-tests "$WASM"
          fi

          echo "All checks passed (tier=$TIER)"
