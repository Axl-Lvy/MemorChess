name: Check code

on:
  pull_request:
    # `edited` re-resolves the tier when the PR description or title changes, so ticking
    # "Force running tests" (or adding [skip-tests] to the title) takes effect without
    # pushing a new commit. Same pattern as benchmark-pr.yml.
    types: [opened, synchronize, reopened, edited]
  schedule:
    - cron: 0 0 * * *

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Resolve which tier of checks to run:
  #   noop  -> no code/build files touched, nothing to verify
  #   cheap -> only commonMain / jvmMain / tests, run jvm + multiplat compile + sonar
  #   full  -> platform code or build config touched, run all targets + sonar
  detect:
    runs-on: ubuntu-latest
    outputs:
      tier: ${{ steps.tier.outputs.tier }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute override
        id: override
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ "$EVENT_NAME" = "schedule" ]; then
            echo "force=full" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$EVENT_NAME" = "pull_request" ]; then
            if printf '%s' "$PR_TITLE" | grep -qi '\[skip-tests\]'; then
              echo "force=noop" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if printf '%s' "$PR_BODY" | grep -qE '\- \[x\] Force running tests'; then
              echo "force=full" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "force=" >> "$GITHUB_OUTPUT"

      - uses: dorny/paths-filter@v4
        id: filter
        if: steps.override.outputs.force == ''
        with:
          filters: |
            code:
              - '**/*.kt'
              - '**/*.kts'
              - '**/*.java'
              - '**/*.toml'
              - '**/*.xml'
              - '**/*.properties'
              - 'gradle/wrapper/**'
              - '.github/workflows/check.yml'
            platform:
              - 'androidApp/**'
              - 'composeApp/src/androidMain/**'
              - 'composeApp/src/iosMain/**'
              - 'composeApp/src/wasmJsMain/**'
              - 'composeApp/src/nonJsMain/**'
              - 'composeApp/src/debugMain/**'
              - '**/AndroidManifest.xml'
              - '**/*.gradle.kts'
              - 'gradle/libs.versions.toml'
              - 'gradle/wrapper/**'
              - '.github/workflows/check.yml'

      - name: Resolve tier
        id: tier
        env:
          FORCE: ${{ steps.override.outputs.force }}
          CODE: ${{ steps.filter.outputs.code }}
          PLATFORM: ${{ steps.filter.outputs.platform }}
        run: |
          if [ -n "$FORCE" ]; then
            echo "tier=$FORCE" >> "$GITHUB_OUTPUT"
            echo "tier (forced) = $FORCE"
            exit 0
          fi
          if [ "$PLATFORM" = "true" ]; then
            echo "tier=full" >> "$GITHUB_OUTPUT"
            echo "tier = full"
          elif [ "$CODE" = "true" ]; then
            echo "tier=cheap" >> "$GITHUB_OUTPUT"
            echo "tier = cheap"
          else
            echo "tier=noop" >> "$GITHUB_OUTPUT"
            echo "tier = noop"
          fi

  # Check code formatting using ktfmt
  format-check:
    needs: [detect]
    if: needs.detect.outputs.tier != 'noop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v6

      - name: Run formatter check
        run: ./gradlew ktfmtCheck

  # Verify every translation locale mirrors the base `values/` resources:
  # same keys, in the same order, for every resource file. Cheap and
  # dependency-free, so it runs unconditionally (not gated by the detect tier).
  translations-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Check translation completeness
        run: python .github/scripts/check_translations.py

  # Run JVM tests with Kover coverage (designated Gradle cache writer)
  jvm-tests:
    needs: [detect]
    if: needs.detect.outputs.tier != 'noop'
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 is required so sonar can compute git blame data
      # when it runs in-line on the cheap tier
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Update local.properties
        run: .github/scripts/update_properties.sh

      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false
          cache-cleanup: never

      - name: Run JVM tests with coverage
        env:
          LICHESS_API_TOKEN: ${{ secrets.LICHESS_API_TOKEN }}
        run: ./gradlew koverXmlReportJvm

      # On the cheap tier the JVM Kover XML is the only coverage source,
      # so run sonar in-line and skip the separate sonar-analysis job to
      # save one runner allocation and one recompile.
      - name: Run sonar (cheap tier only)
        if: needs.detect.outputs.tier == 'cheap'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar --no-configuration-cache --no-parallel --no-daemon

      - name: Upload Kover coverage report
        uses: actions/upload-artifact@v7
        with:
          name: kover-report-jvm
          path: composeApp/build/reports/kover/
          retention-days: 1

      - name: Upload JVM test result files
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: jvm-test-results
          path: composeApp/build/test-results/jvmTest/*.xml
          retention-days: 1

  # Cheap tier safety net: compile Android + wasm to catch expect/actual breaks, plus the
  # macrobenchmark and microbenchmark modules, which no test job builds because their
  # benchmarks only execute on the manually triggered benchmark workflow.
  compile-multiplat:
    needs: [detect]
    if: needs.detect.outputs.tier == 'cheap'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Update local.properties
        run: .github/scripts/update_properties.sh

      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      - name: Compile Android + wasm targets and the benchmark modules
        run: ./gradlew :androidApp:compileDebugKotlin compileKotlinWasmJs :macrobenchmark:assembleBenchmark :microbenchmark:assemble

  # Full tier counterpart for the benchmark modules only: build config changes (gradle
  # files, version catalog) resolve to the full tier, where the test jobs compile every
  # target except these, so without this job a breaking version bump would pass CI.
  compile-benchmark:
    needs: [detect]
    if: needs.detect.outputs.tier == 'full'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Update local.properties
        run: .github/scripts/update_properties.sh

      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      - name: Assemble the benchmark modules
        run: ./gradlew :macrobenchmark:assembleBenchmark :microbenchmark:assemble

  # Full tier: Android instrumented tests on a single emulator
  android-tests:
    needs: [detect]
    if: needs.detect.outputs.tier == 'full'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Update local.properties
        run: .github/scripts/update_properties.sh

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: AVD cache
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-30-google-apis

      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -memory 4096 -partition-size 4096
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Run tests
        env:
          ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL: 1
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -memory 4096 -partition-size 4096
          disable-animations: true
          script: ./gradlew :androidApp:connectedCheck --no-daemon

      - name: Upload coverage to GitHub
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-android
          path: androidApp/build/outputs/code_coverage/
          retention-days: 1

      - name: Upload Android test result files
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: android-test-results
          path: androidApp/build/outputs/androidTest-results/**/*.xml
          if-no-files-found: error
          retention-days: 1

  # Full tier: wasmJs tests (no coverage - Kover does not support wasmJs)
  wasm-tests:
    needs: [detect]
    if: needs.detect.outputs.tier == 'full'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Update local.properties
        run: .github/scripts/update_properties.sh

      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      - name: Run wasm tests
        run: ./gradlew :composeApp:wasmJsTest --no-configuration-cache

      - name: Upload wasm test result files
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: wasm-test-results
          path: composeApp/build/test-results/wasmJsBrowserTest/*.xml
          retention-days: 1

  # Full tier: iOS simulator tests (no coverage - Kover does not support Kotlin/Native)
  # Compose Multiplatform 1.11 / Kotlin 2.3.21 link against iOS 26 SDK symbols
  # (e.g. UIViewLayoutRegion), so this needs Xcode 26 — macos-latest (Xcode 16.x)
  # fails at link time. macos-26 ships Xcode 26; pin it explicitly for reproducibility.
  ios-tests:
    needs: [detect]
    if: needs.detect.outputs.tier == 'full'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Update local.properties
        run: .github/scripts/update_properties.sh

      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      - name: Run iOS simulator tests
        run: ./gradlew :composeApp:iosSimulatorArm64Test

      - name: Upload iOS test result files
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ios-test-results
          path: composeApp/build/test-results/iosSimulatorArm64Test/*.xml
          retention-days: 1

  # Publish aggregated test results and badge
  publish-test-results:
    name: Publish Test Results
    runs-on: ubuntu-latest
    needs: [detect, jvm-tests, android-tests, wasm-tests, ios-tests]
    if: >
      always() && needs.detect.outputs.tier != 'noop' &&
      (needs.jvm-tests.result == 'success' || needs.jvm-tests.result == 'failure')
    permissions:
      checks: write
      pull-requests: write
      contents: read
      issues: read
    steps:
      - name: Download JVM test results
        uses: actions/download-artifact@v8
        with:
          name: jvm-test-results
          path: test-results/jvm

      - name: Download Android test results
        if: needs.detect.outputs.tier == 'full' && needs.android-tests.result != 'skipped'
        uses: actions/download-artifact@v8
        with:
          name: android-test-results
          path: test-results/android

      - name: Download Wasm test results
        if: needs.detect.outputs.tier == 'full' && needs.wasm-tests.result != 'skipped'
        uses: actions/download-artifact@v8
        with:
          name: wasm-test-results
          path: test-results/wasm

      - name: Download iOS test results
        if: needs.detect.outputs.tier == 'full' && needs.ios-tests.result != 'skipped'
        uses: actions/download-artifact@v8
        with:
          name: ios-test-results
          path: test-results/ios

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        id: test-results
        with:
          files: |
            test-results/**/*.xml
          check_name: Test Results
          comment_title: Test Results

      - name: Set badge color
        shell: bash
        run: |
          case ${{ fromJSON( steps.test-results.outputs.json ).conclusion }} in
            success)
              echo "BADGE_COLOR=31c653" >> $GITHUB_ENV
              ;;
            failure)
              echo "BADGE_COLOR=800000" >> $GITHUB_ENV
              ;;
            neutral)
              echo "BADGE_COLOR=696969" >> $GITHUB_ENV
              ;;
          esac

      - name: Create badge
        uses: emibcn/badge-action@808173dd03e2f30c980d03ee49e181626088eee8
        with:
          label: Tests
          status: '${{ fromJSON( steps.test-results.outputs.json ).formatted.stats.tests }} tests passed'
          color: ${{ env.BADGE_COLOR }}
          path: badge.svg

      - name: Upload badge to Gist
        if: github.event_name == 'schedule'
        uses: andymckay/append-gist-action@6e8d64427fe47cbacf4ab6b890411f1d67c07f3e
        with:
          token: ${{ secrets.GIST_TOKEN }}
          gistURL: https://gist.githubusercontent.com/Axl-Lvy/${{ secrets.GIST_ID }}
          file: badge.svg

  # Sonar analysis on full tier: aggregates JVM Kover and Android jacoco
  # reports. On cheap tier sonar runs inside jvm-tests instead.
  sonar-analysis:
    name: Sonar analysis
    runs-on: ubuntu-latest
    needs: [detect, jvm-tests, android-tests]
    if: >
      needs.detect.outputs.tier == 'full' &&
      needs.jvm-tests.result == 'success' &&
      needs.android-tests.result == 'success'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download Android coverage
        if: needs.detect.outputs.tier == 'full'
        uses: actions/download-artifact@v8
        with:
          name: coverage-report-android
          path: androidApp/build/outputs/code_coverage/

      - name: Download JVM Kover report
        uses: actions/download-artifact@v8
        with:
          name: kover-report-jvm
          path: composeApp/build/reports/kover/

      - uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'zulu'

      - uses: gradle/actions/setup-gradle@v6

      - name: Compile sources and generate Android coverage report
        run: ./gradlew --build-cache :androidApp:jacocoAndroidTestReport

      - name: Analyze with coverage
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [[ "${GITHUB_REF_NAME}" == "master" ]]; then
            ./gradlew sonar --no-configuration-cache --no-parallel --no-daemon \
              -Dsonar.branch.name=master
          else
            ./gradlew sonar --no-configuration-cache --no-parallel --no-daemon
          fi

  # Final status check - this is the job that should be required in branch protection
  check-status:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [detect, format-check, jvm-tests, compile-multiplat, compile-benchmark, android-tests, wasm-tests, ios-tests, publish-test-results, sonar-analysis]
    if: always()
    steps:
      - name: Check job results
        env:
          TIER: ${{ needs.detect.outputs.tier }}
          FORMAT: ${{ needs.format-check.result }}
          JVM: ${{ needs.jvm-tests.result }}
          MULTIPLAT: ${{ needs.compile-multiplat.result }}
          BENCHCOMPILE: ${{ needs.compile-benchmark.result }}
          ANDROID: ${{ needs.android-tests.result }}
          WASM: ${{ needs.wasm-tests.result }}
          IOS: ${{ needs.ios-tests.result }}
          PUBLISH: ${{ needs.publish-test-results.result }}
          SONAR: ${{ needs.sonar-analysis.result }}
        run: |
          fail() { echo "$1 failed (result=$2)"; exit 1; }

          echo "Resolved tier: $TIER"

          if [ "$TIER" = "noop" ]; then
            echo "No code changes detected, skipping checks"
            exit 0
          fi

          [ "$FORMAT"  = "success" ] || fail format-check "$FORMAT"
          [ "$JVM"     = "success" ] || fail jvm-tests "$JVM"
          [ "$PUBLISH" = "success" ] || fail publish-test-results "$PUBLISH"

          if [ "$TIER" = "cheap" ]; then
            # sonar runs inside jvm-tests on cheap tier
            [ "$MULTIPLAT" = "success" ] || fail compile-multiplat "$MULTIPLAT"
          fi

          if [ "$TIER" = "full" ]; then
            [ "$BENCHCOMPILE" = "success" ] || fail compile-benchmark "$BENCHCOMPILE"
            [ "$ANDROID" = "success" ] || fail android-tests "$ANDROID"
            [ "$WASM"    = "success" ] || fail wasm-tests "$WASM"
            [ "$IOS"     = "success" ] || fail ios-tests "$IOS"
            [ "$SONAR"   = "success" ] || fail sonar-analysis "$SONAR"
          fi

          echo "All checks passed (tier=$TIER)"
